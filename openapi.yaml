openapi: 3.1.0
info:
  title: Snake Arena API
  version: 1.0.0
  description: >
    Backend expected by the Snake Arena frontend. Covers auth, score
    submission, leaderboard, and real-time active-game spectating.

servers:
  - url: /api
    description: Same-origin API prefix

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: JWT or opaque token returned by /auth/signup or /auth/login.

  schemas:
    User:
      type: object
      required: [id, username]
      properties:
        id:
          type: string
          example: u_abc123
        username:
          type: string
          example: alice

    AuthSession:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          description: Opaque bearer token to include in subsequent requests.
          example: t_xyz789

    GameMode:
      type: string
      enum: [walls, wrap]
      description: >
        "walls" — snake dies on collision with the wall.
        "wrap" — snake wraps to the opposite edge.

    ScoreEntry:
      type: object
      required: [id, userId, username, mode, score, createdAt]
      properties:
        id:
          type: string
          example: s_a1b2c3
        userId:
          type: string
          example: u_abc123
        username:
          type: string
          example: alice
        mode:
          $ref: "#/components/schemas/GameMode"
        score:
          type: integer
          minimum: 0
          example: 42
        createdAt:
          type: integer
          description: Unix timestamp in milliseconds.
          example: 1719100800000

    Point:
      type: object
      required: [x, y]
      properties:
        x:
          type: integer
          minimum: 0
        y:
          type: integer
          minimum: 0

    ActiveGame:
      type: object
      required: [id, userId, username, mode, score, snake, food, gridSize, alive, updatedAt]
      properties:
        id:
          type: string
          example: g_def456
        userId:
          type: string
          example: u_abc123
        username:
          type: string
          example: alice
        mode:
          $ref: "#/components/schemas/GameMode"
        score:
          type: integer
          minimum: 0
          example: 17
        snake:
          type: array
          items:
            $ref: "#/components/schemas/Point"
          description: Ordered list of grid cells; index 0 is the head.
        food:
          $ref: "#/components/schemas/Point"
        gridSize:
          type: integer
          minimum: 1
          example: 20
        alive:
          type: boolean
        updatedAt:
          type: integer
          description: Unix timestamp in milliseconds.
          example: 1719100801234

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Invalid credentials

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ---- Auth ----------------------------------------------------------------

  /auth/signup:
    post:
      summary: Create a new account
      operationId: signup
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: Account created; session returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "409":
          description: Username already taken.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Missing or empty username / password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      summary: Log in with existing credentials
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      summary: Invalidate the current session token
      operationId: logout
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out successfully.
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/session:
    get:
      summary: Return the session for the current token, or null if unauthenticated
      operationId: currentSession
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: >
            Current session if the token is valid, or an explicit null body if
            no valid session exists (the endpoint never returns 401 so the
            client can call it unconditionally on startup).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthSession"
                  - type: "null"

  # ---- Scores --------------------------------------------------------------

  /scores:
    post:
      summary: Submit a score after a game ends
      operationId: submitScore
      tags: [scores]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode, score]
              properties:
                mode:
                  $ref: "#/components/schemas/GameMode"
                score:
                  type: integer
                  minimum: 0
      responses:
        "201":
          description: Score recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreEntry"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /leaderboard:
    get:
      summary: Get the top scores for a game mode
      operationId: getLeaderboard
      tags: [scores]
      parameters:
        - name: mode
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/GameMode"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Maximum number of entries to return.
      responses:
        "200":
          description: Ordered list of top scores (highest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScoreEntry"

  # ---- Active games --------------------------------------------------------

  /games:
    get:
      summary: List all currently active games
      operationId: listActiveGames
      tags: [games]
      responses:
        "200":
          description: Active games sorted by most-recently-updated first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveGame"

  /games/stream:
    get:
      summary: Server-Sent Events stream of the full active-games list
      operationId: subscribeActiveGames
      tags: [games]
      description: >
        Streams the complete list of active games whenever any game is created,
        updated, or removed. Each SSE event has no named event type; the data
        field is a JSON array of ActiveGame objects.
        The client uses this to drive the /watch lobby.
      responses:
        "200":
          description: SSE stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: >
                  Each event: `data: <JSON array of ActiveGame>\n\n`

  /games/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Client-generated game ID (e.g. `g_abc123`).

    get:
      summary: Get a single active game by ID
      operationId: getActiveGame
      tags: [games]
      responses:
        "200":
          description: The game if it exists, or explicit null if not found.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ActiveGame"
                  - type: "null"

    put:
      summary: Create or update an active game (upsert)
      operationId: upsertActiveGame
      tags: [games]
      description: >
        Called on every game-loop tick while a game is running. The server
        sets `username` from the authenticated user (or "guest") and stamps
        `updatedAt`. Guests are allowed so the frontend can publish without
        requiring login.
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, userId, mode, score, snake, food, gridSize, alive]
              properties:
                id:
                  type: string
                userId:
                  type: string
                  description: >
                    "guest" when the player is not authenticated.
                mode:
                  $ref: "#/components/schemas/GameMode"
                score:
                  type: integer
                  minimum: 0
                snake:
                  type: array
                  items:
                    $ref: "#/components/schemas/Point"
                food:
                  $ref: "#/components/schemas/Point"
                gridSize:
                  type: integer
                  minimum: 1
                alive:
                  type: boolean
      responses:
        "200":
          description: The stored ActiveGame with server-set username and updatedAt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveGame"

    delete:
      summary: Mark a game as ended
      operationId: endActiveGame
      tags: [games]
      description: >
        Sets alive to false, keeps the game visible briefly so spectators see
        the "Game over" state, then removes it. Accepts unauthenticated requests
        so a guest can end their own game.
      security:
        - bearerAuth: []
        - {}
      responses:
        "204":
          description: Game ended (or was already gone).

  /games/{id}/stream:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    get:
      summary: Server-Sent Events stream for a single game
      operationId: subscribeActiveGame
      tags: [games]
      description: >
        Streams updates for one specific game. Immediately emits the current
        state (or null if the game doesn't exist), then emits on every change.
        The client uses this to drive the /watch/:id spectator view.
      responses:
        "200":
          description: SSE stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: >
                  Each event: `data: <ActiveGame JSON or null>\n\n`

# ---------------------------------------------------------------------------
# Tags
# ---------------------------------------------------------------------------
tags:
  - name: auth
    description: Sign up, log in, log out, and check the current session.
  - name: scores
    description: Submit scores and read the leaderboard.
  - name: games
    description: Publish and spectate active games in real time.
